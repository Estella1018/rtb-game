<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Google AdTech 黑盒子中心</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #05050a; color: #00ff66; font-family: monospace; padding: 40px; text-align: center; }
        .box { border: 2px solid #00ff66; padding: 20px; background: rgba(0,255,102,0.05); max-width: 600px; margin: 0 auto; box-shadow: 0 0 20px #00ff66; }
        h1 { color: #00e5ff; text-shadow: 0 0 10px #00e5ff; }
        #bid-list { text-align: left; background: #000; height: 150px; overflow-y: auto; padding: 10px; border: 1px solid #00e5ff; }
        button { background: #ff0055; color: white; border: none; padding: 15px 30px; font-size: 18px; cursor: pointer; box-shadow: 0 0 10px #ff0055; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🤖 0.1秒的眼球拍賣會 (RTB)</h1>
    <div class="box">
        <h3>🎯 今日拍賣受眾標籤</h3>
        <p>[新竹市] [陽明交大傳科系] [喜愛ACGN] [正在搜尋Blender與C#] [20代女性]</p>
        <hr style="border-color: #00e5ff;">
        <h3>📈 即時競價流水線 (DSP/SSP Incoming...)</h3>
        <div id="bid-list">等待全班廣告主出價...</div>
        
        <button id="end-btn">啟動 Google 黑盒子結標</button>
    </div>

    <script>
        const socket = io();
        const bidList = document.getElementById('bid-list');
        
        socket.on('update_bids', (bids) => {
            bidList.innerHTML = bids.map(b => `<div>⚡ [${b.company}] 發出競價訊號: <span style="color:#ff0055">$${b.amount} USD</span></div>`).join('');
        });

        document.getElementById('end-btn').onclick = () => {
            socket.emit('trigger_blackbox');
        };

        socket.on('auction_result', (res) => {
            document.body.innerHTML = `
                <h1 style="color:#ff0055; text-shadow: 0 0 20px #ff0055;">⚠️ GOOGLE 演算法執行完畢 ⚠️</h1>
                <div class="box" style="border-color:#ff0055; box-shadow:0 0 30px #ff0055; text-align:left; font-size:18px;">
                    <p>👑 <b>中標廣告主</b>: ${res.winner}</p>
                    <p style="color:#00e5ff">💰 <b>原始競標總價</b>: $${res.original} USD</p>
                    <hr style="border-color:#ff0055">
                    <p>❌ 扣除 Google DSP 服務費 (15%): -$${res.dsp} USD</p>
                    <p>❌ 扣除 Google SSP/AdX 公開市場抽成 (20%): -$${res.ssp} USD</p>
                    <p>❌ 扣除 DMP數據商/代理商/中間商科技稅 (35%): -$${res.tax} USD</p>
                    <hr style="border-color:#ff0055">
                    <p style="font-size:24px; color:#ff0055; animation: blink 1s infinite;">🩸 <b>台灣在地新聞媒體最終收到: $${res.final} USD (約新台幣 5 元)</b></p>
                    <p style="font-size:12px; color:#666;">系統提示：合約已由電子定型化契約自動強制簽署，不爽不要用。</p>
                </div>
            `;
        });
    </script>
</body>
</html>
