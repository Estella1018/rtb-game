<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>注意力古典拍賣會 (五輪制)</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            background-color: #F4F1EA;
            color: #2B2B2B;
            font-family: 'Noto Serif TC', serif;
            padding: 20px;
            text-align: center;
        }

        .box {
            border: 1px solid #2B2B2B;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2em;
            letter-spacing: 2px;
        }

        #bid-list,
        #player-list {
            text-align: left;
            height: 150px;
            overflow-y: auto;
            padding: 15px;
            background: #EBE7DD;
            margin-bottom: 20px;
        }

        button {
            background: #2B2B2B;
            color: #F4F1EA;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1.1em;
            margin: 5px;
        }

        .tragedy-text {
            color: #7A2021;
        }
    </style>
</head>

<body>
    <div class="box" id="main-content">
        <h1>— 數位注意力古典拍賣會 —</h1>
        <p>請台下買家準備 <b>$10,000 USD</b> 資金進場</p>

        <h3>席間買家名冊 (<span id="player-count">0</span>)</h3>
        <div id="player-list">等待買家入席...</div>

        <button id="start-btn">開始拍賣 (Lot 1)</button>

        <div id="auction-area"
            style="display:none; margin-top: 30px; border-top: 1px dashed #2B2B2B; padding-top: 20px;">
            <h2 id="round-title" class="tragedy-text"></h2>
            <p id="round-desc"></p>
            <h3>即時委託紀錄</h3>
            <div id="bid-list"></div>
            <button id="end-btn">落槌結標</button>
        </div>
    </div>

    <script>
        const socket = io();
        let isGameOver = false;

        socket.on('update_players', (players) => {
            if (isGameOver) return;
            document.getElementById('player-count').innerText = players.length;
            document.getElementById('player-list').innerHTML = players.map(p => `<div>🖋️ ${p.name} (剩餘資金: $${p.balance})</div>`).join('');
        });

        document.getElementById('start-btn').onclick = function () {
            socket.emit('host_start_round');
            this.style.display = 'none';
        };

        socket.on('round_start', (data) => {
            // 1. 還原大螢幕的古典羊皮紙配色
            document.body.style.backgroundColor = '#F4F1EA';
            document.body.style.color = '#2B2B2B';

            // 2. 【關鍵修正】完美重建你截圖中的古典結構與排版
            const mainContent = document.getElementById('main-content');
            mainContent.className = 'inner-box'; // 確保外框 Class 沒有跑掉

            mainContent.innerHTML = `
                <h1>— 數位注意力古典拍賣會 —</h1>
                <div class="subtitle">The Programmatic Attention Auction</div>
                
                <hr style="border: 0; border-top: 1px solid #2B2B2B; margin: 25px 0;">
                
                <h2 id="round-title" class="tragedy-text" style="font-size: 2em; color: #7A2021; margin-bottom: 5px;"></h2>
                <p id="round-desc" style="font-size: 1.1em; color: #555; margin-bottom: 25px;"></p>
                
                <h3 style="font-weight: normal; letter-spacing: 1px; margin-bottom: 15px;">即時委託紀錄</h3>
                
                <div id="bid-list" style="text-align: left; height: 180px; overflow-y: auto; padding: 15px; background: #EBE7DD; font-size: 1.1em; line-height: 1.8; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); margin-bottom: 20px;">
                    等待席間買家出價...
                </div>
                
                <button id="end-btn" style="background: #2B2B2B; color: #F4F1EA; border: 1px solid #2B2B2B; padding: 12px 35px; font-size: 1.1em; font-family: inherit; cursor: pointer; margin-top: 10px; transition: all 0.3s; letter-spacing: 1px;">
                    落槌結標
                </button>
            `;

            // 3. 將新一輪的後端劇本數據灌入對應的 ID
            document.getElementById('round-title').innerText = data.roundData.title;
            document.getElementById('round-desc').innerText = "標籤：" + data.roundData.desc;

            // 4. 清空上一次的出價紀錄，準備迎接新訊號
            const list = document.getElementById('bid-list');
            list.innerHTML = '等待席間買家出價...';

            // 5. 【極重要】重新為新印出來的「落槌結標」按鈕綁定點擊事件
            document.getElementById('end-btn').onclick = () => {
                socket.emit('trigger_blackbox');
            };
        });

        socket.on('update_bids', (bids) => {
            const list = document.getElementById('bid-list');
            list.innerHTML = bids.map(b => `<div>📜 [${b.name}] 出價： <strong>$${b.amount}</strong></div>`).join('');
            list.scrollTop = list.scrollHeight;
        });

        document.getElementById('end-btn').onclick = function () {
            socket.emit('trigger_blackbox');
            this.style.display = 'none';
        };

        socket.on('round_result', (res) => {
            // 1. 切換成天鵝絨暗黑哥德風背景，營造利益被吞噬的深淵感
            document.body.style.backgroundColor = '#1A1A1A';
            document.body.style.color = '#F4F1EA';

            const mainContent = document.getElementById('main-content');
            mainContent.className = 'inner-box tragedy-bg';

            const profitColor = res.netProfit >= 0 ? '#00e5ff' : '#7A2021';
            const profitText = res.netProfit >= 0 ? '獲利' : '嚴重虧損';

            // 2. 完美對應新版結構，印出扣款過程與「進入下一輪」按鈕
            mainContent.innerHTML = `
                <h2 class="tragedy-text" style="font-size: 2.2em; color: #7A2021; margin-bottom: 5px;">拍賣落槌：贏家的詛咒</h2>
                <p style="font-style: italic; color: #888; margin-bottom: 30px;">這是一場演算法的狂歡，與內容創作者的悲歌。</p>
                
                <div style="text-align:left; font-size:1.15em; line-height: 2; max-width: 550px; margin: 0 auto;">
                    <p>⚜️ <b>得標買家</b>：${res.winnerName} (最終出價 $${res.bidAmount} USD)</p>
                    <p>👁️ <b>受眾隱藏真實價值</b>：$${res.trueValue} USD</p>
                    <p style="color: ${profitColor}; font-size: 1.4em; font-weight: bold; margin: 15px 0; text-align: center; border: 1px dashed ${profitColor}; padding: 5px;">
                        📉 廣告主本次${profitText}：$${res.netProfit} USD
                    </p>
                    
                    <hr style="border-color: #333; margin: 20px 0;">
                    <p style="color: #888; font-size: 0.95em; text-align: center; margin-bottom: 15px;">— 0.1秒內的黑盒子分配流水線 (平台強制扣款) —</p>
                    <p style="color: #bbb;">❌ 扣除 Google DSP 服務費 (15%): -$${(res.bidAmount * 0.15).toFixed(2)} USD</p>
                    <p style="color: #bbb;">❌ 扣除 Google SSP/AdX 公開市場抽成 (20%): -$${((res.bidAmount * 0.85) * 0.20).toFixed(2)} USD</p>
                    <p style="color: #bbb;">❌ 扣除 DMP數據商/代理商隱形科技稅 (35%): -$${(res.bidAmount * 0.35).toFixed(2)} USD</p>
                    
                    <hr style="border-color: #333; margin: 20px 0;">
                    <p class="tragedy-text" style="font-size: 1.6em; text-align: center; margin-top: 25px; color: #7A2021;">
                        <b>🩸 台灣在地新聞媒體最終實得：$${res.mediaFinal} USD</b>
                    </p>
                    <p style="text-align: center; font-size: 0.85em; color: #555; margin-bottom: 30px;">(約合新台幣 5 元)</p>
                </div>
                
                <button id="next-round-btn" style="background: #7A2021; color: #F4F1EA; border: 1px solid #7A2021; padding: 12px 35px; font-size: 1.1em; font-family: inherit; cursor: pointer;">
                    進入下一輪拍賣 (Next Lot)
                </button>
            `;

            // 3. 綁定下一輪的點擊事件
            document.getElementById('next-round-btn').onclick = () => {
                socket.emit('host_start_round');
            };
        });

        // 修正：第五輪結束後的終極排行榜畫面
        socket.on('game_over', (leaderboard) => {
            document.body.style.backgroundColor = '#F4F1EA';
            document.body.style.color = '#2B2B2B';

            const mainContent = document.getElementById('main-content');
            mainContent.className = 'inner-box';

            let rankHtml = leaderboard.map((p, index) => {
                let color = p.balance >= 10000 ? '#27ae60' : '#7A2021';
                let icon = index === 0 ? '👑' : (index === leaderboard.length - 1 ? '💀' : '▪️');
                return `<div style="font-size: 1.3em; margin: 15px 0;">${icon} 第 ${index + 1} 名: <b>${p.name}</b> <span style="color:${color}">(最終資產: $${p.balance.toFixed(0)})</span></div>`;
            }).join('');

            mainContent.innerHTML = `
                <h1>— 結算：誰是資本的奴隸？ —</h1>
                <div class="subtitle">The Final Financial Status</div>
                <p style="margin-bottom: 40px; color: #555; font-style: italic;">廣告主在席間殺紅了眼，但真正的贏家永遠只有穩抽不賠的科技巨頭。</p>
                
                <div style="text-align: left; max-width: 500px; margin: 0 auto; border-top: 1px solid #2B2B2B; padding-top: 20px;">
                    ${rankHtml}
                </div>
                <p style="font-size: 0.9em; color: #666; margin-top: 40px;">* 註：歷經五輪激戰，媒體累計產出 5 篇深度報導，累計收益不滿新台幣 30 元。</p>
            `;
        });
    </script>
</body>

</html>
