<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>買家出價委託書</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            background-color: #F4F1EA;
            color: #2B2B2B;
            font-family: 'Noto Serif TC', serif;
            padding: 20px;
            text-align: center;
        }

        .card {
            border: 1px solid #2B2B2B;
            padding: 30px 20px;
            background: #FFFDFC;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.05);
        }

        input[type=text],
        input[type=number] {
            width: 80%;
            padding: 10px;
            font-size: 1.1em;
            margin: 20px 0;
            border: 1px solid #2B2B2B;
            text-align: center;
        }

        button {
            background: #2B2B2B;
            color: #F4F1EA;
            border: none;
            padding: 15px;
            width: 90%;
            font-size: 1.2em;
            cursor: pointer;
        }

        button:disabled {
            background: #999;
        }

        .hidden {
            display: none;
        }

        .tragedy-text {
            color: #7A2021;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="login-screen" class="card">
        <h2>— 買家入席 —</h2>
        <p>您已獲得初始資金 <b>$10,000 USD</b></p>
        <input type="text" id="comp-name" placeholder="請輸入品牌名稱..." value="某跨國遊戲商">
        <button id="join-btn">入席拍賣會</button>
    </div>

    <div id="bid-screen" class="card hidden">
        <h3 id="round-title"></h3>
        <p style="color:#666;">您的剩餘資金：<b style="color:#2B2B2B; font-size:1.2em;">$<span id="my-balance">10000</span></b>
        </p>
        <hr style="margin: 20px 0;">
        <p>請輸入本次競標額 (最高不可超過餘額)：</p>
        <input type="number" id="bid-amount" min="1" max="10000" value="1000">
        <button id="submit-btn">呈交委託</button>
    </div>

    <div id="wait-screen" class="card hidden">
        <h2 id="result-title">等待拍賣官落槌...</h2>
        <p id="result-desc"></p>
    </div>
    <div id="reflection-screen" class="card hidden">
        <h2 class="tragedy-text">— 媒體生存抉擇 —</h2>
        <p style="color: #555; font-size: 0.9em; line-height: 1.6;">你現在是只拿到 5 塊錢的新聞媒體主管，為了養活公司，你決定怎麼做？</p>
        <input type="text" id="reflection-input" placeholder="例如：狂發業配文、裁員..."
            style="width: 85%; padding: 15px; font-size: 1.1em; margin: 20px 0; border: 1px solid #7A2021;">
        <button id="submit-reflection-btn" style="background: #7A2021;">送出抉擇至大螢幕</button>
    </div>

    <script>
        const socket = io();
        let myBalance = 10000;
        let myName = '';

        document.getElementById('join-btn').onclick = () => {
            myName = document.getElementById('comp-name').value;
            if (!myName) return;
            socket.emit('player_join', myName);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('wait-screen').classList.remove('hidden');
            document.getElementById('result-title').innerText = "已入席，等待第一件拍賣品...";
        };

        socket.on('round_start', (data) => {
            document.getElementById('wait-screen').classList.add('hidden');
            document.getElementById('bid-screen').classList.remove('hidden');
            document.getElementById('round-title').innerText = data.roundData.title;
            document.getElementById('my-balance').innerText = myBalance;
            document.getElementById('bid-amount').max = myBalance;
            document.getElementById('submit-btn').innerText = "呈交委託";
            document.getElementById('submit-btn').disabled = false;
        });

        document.getElementById('submit-btn').onclick = function () {
            let bid = parseFloat(document.getElementById('bid-amount').value);
            if (bid > myBalance) bid = myBalance;
            socket.emit('submit_bid', bid);

            this.innerText = "已送出，等待結果...";
            this.disabled = true;
        };

        socket.on('round_result', (res) => {
            document.getElementById('bid-screen').classList.add('hidden');
            document.getElementById('wait-screen').classList.remove('hidden');

            if (res.winnerId === socket.id) {
                myBalance += res.netProfit; // 更新自己手機的餘額
                const status = res.netProfit >= 0 ? '賺到了' : '被坑了';
                document.getElementById('result-title').innerHTML = `落槌！您得標了，但...`;
                document.getElementById('result-desc').innerHTML = `
                    您出價 $${res.bidAmount}，實際價值僅 $${res.trueValue}<br><br>
                    這波交易您 <span class="tragedy-text">${status} $${res.netProfit}</span><br>
                    您目前剩餘資金：$${myBalance}<br><br>
                    <span style="font-size:0.8em; color:#666;">請看大螢幕，媒體實拿少得可憐...</span>
                `;
            } else {
                document.getElementById('result-title').innerText = "您未得標";
                document.getElementById('result-desc').innerHTML = `
                    本輪被 <b>${res.winnerName}</b> 搶走了。<br>
                    請看大螢幕看看他是賺是賠！
                `;
            }
        });

        socket.on('game_over', () => {
            document.getElementById('wait-screen').classList.remove('hidden');
            document.getElementById('bid-screen').classList.add('hidden');
            document.getElementById('result-title').innerText = "拍賣會結束";
            document.getElementById('result-desc').innerHTML = "請看大螢幕確認最終排名！<br>看看誰破產了，誰又賺飽了？";
        });
        // 接收伺服器：進入反思階段
        socket.on('start_discussion', () => {
            document.getElementById('wait-screen').classList.add('hidden');
            document.getElementById('reflection-screen').classList.remove('hidden');
        });

        // 送出反思文字 (支援無限次送出)
        document.getElementById('submit-reflection-btn').onclick = function () {
            const input = document.getElementById('reflection-input');
            const text = input.value;

            if (!text) return; // 如果沒打字就不動作

            // 送出資料給伺服器
            socket.emit('submit_reflection', text);

            // 💡 【修正重點 4】清空輸入框，讓同學可以繼續打字
            input.value = '';

            // 給予短暫的視覺回饋，然後恢復原狀
            const originalText = this.innerText;
            this.innerText = "已送出！可繼續輸入...";
            this.style.background = '#27ae60'; // 變成綠色提示成功

            setTimeout(() => {
                this.innerText = originalText;
                this.style.background = '#7A2021'; // 恢復原本的暗紅色
            }, 1500); // 1.5 秒後恢復
        };
    </script>
</body>

</html>
